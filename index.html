<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#171717">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Curio">
    <title>Curio</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="app-shell" aria-label="Curio inspiration capture">
      <header class="topbar">
        <img class="brand-logo" src="assets/logo-horizontal.png" alt="Curio">
        <div class="topbar-actions">
          <button class="ghost-button" id="openData" type="button">数据</button>
          <button class="ghost-button" id="focusCapture" type="button">记录</button>
        </div>
      </header>

      <section class="view is-active" id="captureView" aria-labelledby="captureTitle">
        <div class="capture-panel">
          <h2 id="captureTitle">来，说给我听</h2>
          <div class="voice-panel">
            <button class="voice-button" id="voiceInput" type="button" aria-label="说来听听" aria-pressed="false">
              <img src="assets/listener.png" alt="" aria-hidden="true">
            </button>
            <span id="voiceStatus">点一下，我听着呢。</span>
          </div>
          <textarea id="ideaInput" maxlength="420" placeholder="还有半句？丢这里。"></textarea>
          <div class="capture-actions">
            <span id="charCount">0 / 420</span>
            <button class="primary-button" id="saveIdea" type="button">收起来</button>
          </div>
        </div>

        <article class="preview-card" id="latestCard" aria-live="polite">
          <p class="section-label">最近</p>
          <div id="latestContent" class="empty-copy">还空着呢，先丢一条进来。</div>
        </article>
      </section>

      <section class="view" id="galleryView" aria-labelledby="galleryTitle">
        <div class="view-heading">
          <div class="view-title-wrap">
            <h2 id="galleryTitle">灵感</h2>
            <span class="title-doodle" aria-hidden="true"></span>
          </div>
          <span id="galleryCount">0 条</span>
        </div>

        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="搜索灵感">
          <button class="toggle-button" id="favoriteFilter" type="button" aria-pressed="false">喜欢</button>
        </div>

        <div class="card-list" id="galleryList"></div>
      </section>

      <section class="view" id="rediscoverView" aria-labelledby="rediscoverTitle">
        <div class="view-heading">
          <div class="view-title-wrap">
            <h2 id="rediscoverTitle">翻翻旧想法</h2>
            <span class="title-doodle" aria-hidden="true"></span>
          </div>
          <button class="ghost-button" id="drawIdea" type="button">换一条</button>
        </div>

        <div class="rediscover-stage" id="rediscoverStage">
          <p class="empty-copy">多存几条以后，我随机抓一条给你看。</p>
        </div>
      </section>

      <nav class="bottom-nav" aria-label="Primary">
        <button class="nav-button is-active" type="button" data-view="captureView">记录</button>
        <button class="nav-button" type="button" data-view="galleryView">灵感</button>
        <button class="nav-button" type="button" data-view="rediscoverView">翻翻</button>
      </nav>
    </main>

    <dialog id="editDialog">
      <form method="dialog" class="dialog-card">
        <p class="section-label">改一下</p>
        <textarea id="editInput" maxlength="420"></textarea>
        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit">取消</button>
          <button class="primary-button" id="confirmEdit" value="default" type="button">改好了</button>
        </div>
      </form>
    </dialog>

    <dialog id="dataDialog">
      <form method="dialog" class="dialog-card">
        <p class="section-label">数据</p>
        <p class="data-count" id="dataCount">0 条灵感</p>
        <div class="data-actions">
          <button class="ghost-button" id="restoreSamples" type="button">恢复样例</button>
          <button class="ghost-button danger-button" id="clearIdeas" type="button">清空数据</button>
        </div>
        <div class="dialog-actions">
          <button class="primary-button" value="cancel" type="submit">完成</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
